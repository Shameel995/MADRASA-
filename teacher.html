<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Makatib e Yaqoob (Rh)</title>
    <!-- Bootstrap CSS for Beautiful Design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .madrasa-header {
            background-color: #004d26; /* Deep Islamic Green */
            color: #fff;
            padding: 20px;
            border-bottom: 5px solid #d4af37; /* Gold Border */
            text-align: center;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .madrasa-header h1 {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .card-header {
            background-color: #006633;
            color: white;
            font-weight: 600;
            border-radius: 15px 15px 0 0 !pximportant;
        }
        .btn-submit {
            background-color: #004d26;
            color: white;
            border: 2px solid #d4af37;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #d4af37;
            color: #004d26;
        }
        .table-theme th {
            background-color: #004d26 !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="container mb-4">
        <div class="madrasa-header">
            <h1>Makatib e Yaqoob (Rh) / مکاتب یعقوبؒ</h1>
            <p class="mb-0">Melvisharam | Teacher Log & Portal</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="row mb-4">
            <!-- Teacher Info & Class Selection -->
            <div class="col-md-4 mb-3">
                <div class="card h-100">
                    <div class="card-header"> (Teacher Info)</div>
                    <div class="card-body">
                        <p><strong>Teacher Name:</strong> Maulana Md Ibrahim Sahib</p>
                        <div class="mb-3">
                            <label for="classSelect" class="form-label"> (Select Class):</label>
                            <select class="form-select" id="classSelect">
                                <option>Hifz Class - A</option>
                                <option>Nazra Class - B</option>
                                <option>Deenyat Class</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"> (Date):</label>
                            <input type="date" class="form-control" id="todayDate" value="2026-07-10">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Attendance & Sabaq Entry Form -->
            <div class="col-md-8 mb-3">
                <div class="card">
                    <div class="card-header"> (Attendance & Sabaq Status)</div>
                    <div class="card-body table-responsive">
                        <table class="table table-bordered align-middle">
                            <thead class="table-theme">
                                <tr>
                                    <th>Roll No</th>
                                    <th>Talib-e-Ilm (Student)</th>
                                    <th>Haziri (Attendance)</th>
                                    <th> /(Sabaq Status)</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Student 1 -->
                                <tr>
                                    <td>101</td>
                                    <td><strong>Zaid Ahmed</strong></td>
                                    <td>
                                        <select class="form-select form-select-sm border-success">
                                            <option value="Present"> (Present)</option>
                                            <option value="Absent"> (Absent)</option>
                                            <option value="Leave"> (Leave)</option>
                                        </select>
                                    </td>
                                    <td>
                                        <input type="text" class="form-control form-control-sm mb-1" placeholder="Para 30, Surah Naba, Ayat 1-10">
                                        <select class="form-select form-select-sm">
                                            <option> (New Lesson)</option>
                                            <option>(Last 7 Days)</option>
                                            <option>(Aamoqta/Old)</option>
                                        </select>
                                    </td>
                                </tr>
                                <!-- Student 2 -->
                                <tr>
                                    <td>102</td>
                                    <td><strong>Omar Farooq</strong></td>
                                    <td>
                                        <select class="form-select form-select-sm border-success">
                                            <option value="Present"> (Present)</option>
                                            <option value="Absent"> (Absent)</option>
                                            <option value="Leave"> (Leave)</option>
                                        </select>
                                    </td>
                                    <td>
                                        <input type="text" class="form-control form-control-sm mb-1" placeholder="Para 1, Al-Baqarah, Ayat 20-30">
                                        <select class="form-select form-select-sm">
                                            <option>naya sabaq (New Lesson)</option>
                                            <option>haftawari karguzari (Last 7 Days)</option>
                                            <option>(Aamoqta/Old)</option>
                                        </select>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="text-end">
                            <button type="button" class="btn btn-submit px-4" onclick="alert('Data Save Ho Gaya! (Abhi Yeh Google Sheet Se Connect Nahi Hai)')">Save Record</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
