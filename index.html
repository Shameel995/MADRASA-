<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        h1 { text-align: center; color: #4a4a8a; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 45%; min-width: 300px; }
        h2 { border-bottom: 2px solid #4a4a8a; padding-bottom: 5px; color: #4a4a8a; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #4a4a8a; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background-color: #35356b; }
        .data-list { margin-top: 15px; }
        .data-item { background: #f9f9f9; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; position: relative; }
        .data-item p { margin: 4px 0; font-size: 14px; }
        .delete-btn { background-color: #d9534f; position: absolute; top: 10px; right: 10px; padding: 5px 8px; font-size: 12px; }
        .delete-btn:hover { background-color: #c9302c; }
    </style>
</head>
<body>

    <h1>School Records Management</h1>

    <div class="container">
        <!-- STUDENT SECTION -->
        <div class="section">
            <h2>Students Management</h2>
            <form id="studentForm">
                <input type="text" id="sName" placeholder="Student Name" required>
                <input type="date" id="sDob" required>
                <input type="text" id="sParent" placeholder="Father / Guardian Name" required>
                <input type="tel" id="sMobile" placeholder="Mobile Number" required>
                <textarea id="sAddress" placeholder="Address" rows="2" required></textarea>
                <button type="submit">Add Student</button>
            </form>
            <div id="studentList" class="data-list"></div>
        </div>

        <!-- TEACHER SECTION -->
        <div class="section">
            <h2>Teachers Management</h2>
            <form id="teacherForm">
                <input type="text" id="tName" placeholder="Teacher Name" required>
                <input type="text" id="tQual" placeholder="Qualification" required>
                <input type="tel" id="tMobile" placeholder="Mobile Number" required>
                <input type="text" id="tExp" placeholder="Experience (e.g., 5 Years)" required>
                <textarea id="tAddress" placeholder="Address" rows="2" required></textarea>
                <button type="submit">Add Teacher</button>
            </form>
            <div id="teacherList" class="data-list"></div>
        </div>
    </div>

    <script>
        // Data Load aur Save karne ke Functions
        let students = JSON.parse(localStorage.getItem('students')) || [];
        let teachers = JSON.parse(localStorage.getItem('teachers')) || [];

        // UI par Data Display karne ka function
        function displayData() {
            // Student List Render karein
            const studentList = document.getElementById('studentList');
            studentList.innerHTML = '';
            students.forEach((student, index) => {
                studentList.innerHTML += `
                    <div class="data-item">
                        <p><strong>Name:</strong> ${student.name}</p>
                        <p><strong>DOB:</strong> ${student.dob}</p>
                        <p><strong>Guardian:</strong> ${student.parent}</p>
                        <p><strong>Mobile:</strong> ${student.mobile}</p>
                        <p><strong>Address:</strong> ${student.address}</p>
                        <button class="delete-btn" onclick="removeStudent(${index})">Remove</button>
                    </div>
                `;
            });

            // Teacher List Render karein
            const teacherList = document.getElementById('teacherList');
            teacherList.innerHTML = '';
            teachers.forEach((teacher, index) => {
                teacherList.innerHTML += `
                    <div class="data-item">
                        <p><strong>Name:</strong> ${teacher.name}</p>
                        <p><strong>Qualification:</strong> ${teacher.qual}</p>
                        <p><strong>Mobile:</strong> ${teacher.mobile}</p>
                        <p><strong>Experience:</strong> ${teacher.exp}</p>
                        <p><strong>Address:</strong> ${teacher.address}</p>
                        <button class="delete-btn" onclick="removeTeacher(${index})">Remove</button>
                    </div>
                `;
            });
        }

        // Student Add karne ka Event
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newStudent = {
                name: document.getElementById('sName').value,
                dob: document.getElementById('sDob').value,
                parent: document.getElementById('sParent').value,
                mobile: document.getElementById('sMobile').value,
                address: document.getElementById('sAddress').value
            };
            students.push(newStudent);
            localStorage.setItem('students', JSON.stringify(students));
            this.reset();
            displayData();
        });

        // Teacher Add karne ka Event
        document.getElementById('teacherForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newTeacher = {
                name: document.getElementById('tName').value,
                qual: document.getElementById('tQual').value,
                mobile: document.getElementById('tMobile').value,
                exp: document.getElementById('tExp').value,
                address: document.getElementById('tAddress').value
            };
            teachers.push(newTeacher);
            localStorage.setItem('teachers', JSON.stringify(teachers));
            this.reset();
            displayData();
        });

        // Student Remove karne ka function
        function removeStudent(index) {
            students.splice(index, 1);
            localStorage.setItem('students', JSON.stringify(students));
            displayData();
        }

        // Teacher Remove karne ka function
        function removeTeacher(index) {
            teachers.splice(index, 1);
            localStorage.setItem('teachers', JSON.stringify(teachers));
            displayData();
        }

        // Page load hote hi data dikhayein
        displayData();
    </script>
</body>
</html>
